name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  # Gate: validate this app against the hub's manifest/migration/ai_access
  # contract before it can build or publish. Public repos can't call a private
  # repo's reusable workflow, so we run the hub's validators directly — installing
  # only the tiny standalone runner (vitest + better-sqlite3), NOT the full hub
  # monorepo. See firebirdsystems/chickadeebandit packages/hub/contract-ci.
  contract:
    runs-on: ubuntu-latest
    env:
      HUB_CHECKOUT_TOKEN: ${{ secrets.HUB_CHECKOUT_TOKEN }}
    steps:
      - name: Verify hub checkout token is configured
        if: env.HUB_CHECKOUT_TOKEN == ''
        run: |
          echo "::error::Missing repository secret HUB_CHECKOUT_TOKEN. Create a fine-grained GitHub token with read access to firebirdsystems/chickadeebandit and add it as this repo's HUB_CHECKOUT_TOKEN secret."
          exit 1
      - name: Check out this app
        uses: actions/checkout@v4
        with:
          path: app-src/app
      - name: Check out hub (validators — private repo, via token)
        uses: actions/checkout@v4
        with:
          repository: firebirdsystems/chickadeebandit
          token: ${{ env.HUB_CHECKOUT_TOKEN }}
          path: hub
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install contract runner (vitest + better-sqlite3 only)
        working-directory: hub/packages/hub/contract-ci
        run: npm install --no-audit --no-fund
      - name: Run app contract suite
        working-directory: hub/packages/hub/contract-ci
        env:
          CB_APPS_DIR: ${{ github.workspace }}/app-src
        run: npm run contract

  build-and-release:
    needs: contract
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build bundle
        run: node build.mjs

      - name: Compute bundle hash
        id: hash
        run: |
          HASH=$(sha256sum dist/bundle.json | cut -d' ' -f1)
          echo "sha256=$HASH" >> $GITHUB_OUTPUT
          echo "bundle.json SHA-256: $HASH"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/bundle.json
          generate_release_notes: true
          body: |
            **bundle.json SHA-256:** `${{ steps.hash.outputs.sha256 }}`
            Update `catalog.json` in the hub repo with this hash.
